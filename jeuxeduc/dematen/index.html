<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De maten – Jeux éducatifs</title>
    <style>
        /* ── Variables & reset ────────────────────────────────── */
        :root {
            --clr-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --clr-primary: #4a90e2;
            --clr-primary-dark: #357abd;
            --clr-success: #27ae60;
            --clr-success-light: #d4edda;
            --clr-error: #e74c3c;
            --clr-error-light: #fde8e8;
            --clr-selected: #3498db;
            --clr-selected-light: #d6eaf8;
            --clr-text: #2c3e50;
            --clr-white: #fff;
            --radius: 10px;
            --shadow: 0 4px 8px rgba(0,0,0,.12);
            --transition: all .25s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--clr-bg);
            color: var(--clr-text);
            min-height: 100vh;
        }

        /* ── Navigation ───────────────────────────────────────── */
        .nav-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        nav {
            background: var(--clr-white);
            padding: .8rem 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            justify-content: center;
        }

        nav a {
            color: var(--clr-white);
            text-decoration: none;
            font-weight: 600;
            padding: .5rem 1rem;
            background: var(--clr-primary);
            border-radius: 8px;
            transition: var(--transition);
            font-size: .9rem;
        }

        nav a:hover, nav a.active {
            background: var(--clr-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,.2);
        }

        /* ── Page header ──────────────────────────────────────── */
        .page-header {
            text-align: center;
            padding: 1.2rem 1rem .5rem;
        }

        .page-header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: var(--clr-text);
            text-shadow: 1px 2px 4px rgba(0,0,0,.1);
        }

        .subtitle {
            font-size: clamp(.85rem, 2.5vw, 1.05rem);
            color: #555;
            margin-top: .4rem;
        }

        /* ── Control bar ──────────────────────────────────────── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: .7rem;
            padding: .8rem 1rem;
        }

        .btn {
            font-size: clamp(.85rem, 2.5vw, 1rem);
            font-weight: 600;
            padding: .55rem 1.3rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

        .btn-niveau { background: #ecf0f1; color: var(--clr-text); }
        .btn-niveau.active { background: var(--clr-primary); color: var(--clr-white); }

        .btn-reset { background: #e67e22; color: var(--clr-white); }

        .help-toggle {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            background: var(--clr-white);
            padding: .45rem .8rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-weight: 600;
            color: var(--clr-text);
            font-size: .92rem;
            cursor: pointer;
            user-select: none;
        }

        .help-toggle input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        #score-display {
            font-size: 1rem;
            font-weight: 700;
            background: var(--clr-white);
            padding: .5rem 1rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            color: var(--clr-text);
            min-width: 90px;
            text-align: center;
        }

        /* ── Game layout ──────────────────────────────────────── */
        .game-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 .8rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            align-items: start;
        }

        .col-header {
            font-size: clamp(.8rem, 2vw, .95rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #888;
            margin-bottom: .5rem;
            text-align: center;
        }

        /* ── Category cards (left column) ─────────────────────── */
        .category-card {
            background: var(--clr-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: .7rem;
            overflow: hidden;
            transition: var(--transition);
            border: 2px solid transparent;
            cursor: pointer;
        }

        .category-card:hover:not(.complete) {
            border-color: var(--clr-primary);
        }

        .category-card.complete {
            border-color: var(--clr-success);
            background: var(--clr-success-light);
            cursor: default;
        }

        .category-card.flash-error {
            animation: shake .4s ease;
            border-color: var(--clr-error);
        }

        .cat-title {
            padding: .55rem .9rem;
            font-weight: 700;
            font-size: clamp(.85rem, 2.2vw, 1rem);
            background: #f0f4fb;
            border-bottom: 1px solid #e0e6ef;
            transition: var(--transition);
        }

        .category-card.complete .cat-title {
            background: #b8e8c8;
            color: #1a7a40;
        }

        .cat-items {
            min-height: 30px;
            padding: .4rem .9rem .5rem;
            display: flex;
            flex-wrap: wrap;
            gap: .3rem;
        }

        .matched-chip {
            background: var(--clr-success);
            color: var(--clr-white);
            border-radius: 20px;
            padding: .2rem .7rem;
            font-size: clamp(.7rem, 1.8vw, .85rem);
            font-weight: 600;
            animation: popIn .3s ease;
        }

        /* ── Group separator (level 2) ────────────────────────── */
        .group-sep {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: .5rem 0 .3rem;
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #888;
        }

        .group-sep::before, .group-sep::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ccc;
        }

        /* ── Item cards (right column) ─────────────────────────── */
        .items-pool {
            display: flex;
            flex-direction: column;
            gap: .55rem;
        }

        .item-card {
            background: var(--clr-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: .65rem 1rem;
            font-size: clamp(.8rem, 2.2vw, 1rem);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            user-select: none;
        }

        .item-card:hover:not(.used) {
            border-color: var(--clr-primary);
            transform: translateX(-3px);
        }

        .item-card.selected {
            border-color: var(--clr-selected);
            background: var(--clr-selected-light);
            font-weight: 700;
            transform: translateX(-4px);
        }

        .item-card.used {
            opacity: .35;
            cursor: default;
            text-decoration: line-through;
        }

        .item-card.flash-wrong {
            background: var(--clr-error-light);
            border-color: var(--clr-error);
            animation: shake .4s ease;
        }

        /* ── Notification banner ──────────────────────────────── */
        #notification {
            position: fixed;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: .75rem 1.8rem;
            border-radius: 25px;
            background: var(--clr-white);
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
            font-weight: 700;
            font-size: 1rem;
            z-index: 999;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        #notification.show { opacity: 1; }
        #notification.ok   { color: var(--clr-success); }
        #notification.ko   { color: var(--clr-error); }

        #help-tooltip {
            position: fixed;
            z-index: 1200;
            max-width: min(70vw, 520px);
            background: #1f2937;
            color: #fff;
            padding: .7rem 1rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,.35);
            font-size: clamp(1rem, 2.7vw, 1.5rem);
            font-weight: 700;
            line-height: 1.25;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity .12s ease;
        }

        #help-tooltip.show {
            opacity: 1;
        }

        /* ── Victory overlay ──────────────────────────────────── */
        #victory {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #victory.show { display: flex; }

        .victory-box {
            background: var(--clr-white);
            border-radius: 16px;
            padding: 2.5rem 3rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
            animation: popIn .4s ease;
            max-width: 90vw;
        }

        .victory-box h2 { font-size: 2rem; margin-bottom: .5rem; }
        .victory-box p  { font-size: 1.1rem; color: #555; margin-bottom: 1.2rem; }

        .btn-next-level, .btn-replay {
            margin: .3rem;
            padding: .7rem 1.6rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-next-level { background: var(--clr-success); color: var(--clr-white); }
        .btn-replay     { background: #e67e22; color: var(--clr-white); }

        .btn-next-level:hover, .btn-replay:hover { opacity: .9; transform: translateY(-2px); }

        /* ── Animations ────────────────────────────────────────── */
        @keyframes popIn {
            from { transform: scale(.7); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 600px) {
            .game-wrapper { grid-template-columns: 1fr; }
            .col-left     { order: 2; }
            .col-right    { order: 1; }
        }
    </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────── -->
<div class="nav-wrap">
    <nav>
        <a href="../">Accueil</a>
        <a href="../calculette/">Calculette</a>
        <a href="../cijfers/">Cijfers</a>
        <a href="../dactylo/">Dactylo</a>
        <a href="../ephem/">Éphémérides</a>
        <a href="../trianglegen/">Triangle</a>
        <a href="../vocab/">Vocabulaire</a>
        <a href="../hetweer/">Het Weer</a>
        <a href="../fractions/">Fractions</a>
        <a href="../hoofdsteden/">Hoofdsteden</a>
        <a href="../afrique/">Afrique</a>
        <a href="." class="active">De maten</a>
    </nav>
</div>

<!-- ── Page header ─────────────────────────────────────────── -->
<div class="page-header">
    <h1>📏 De maten</h1>
    <p class="subtitle" id="subtitle"></p>
</div>

<!-- ── Controls ────────────────────────────────────────────── -->
<div class="controls">
    <button class="btn btn-niveau active" id="btn-n1" onclick="loadLevel(1)">
        Niveau 1 – Meetinstrumenten
    </button>
    <button class="btn btn-niveau" id="btn-n2" onclick="loadLevel(2)">
        Niveau 2 – Concrete voorbeelden
    </button>
    <label class="help-toggle" for="help-toggle">
        <input type="checkbox" id="help-toggle" onchange="toggleHelp(this.checked)">
        Aide (FR au survol)
    </label>
    <span id="score-display">0 / 0</span>
    <button class="btn btn-reset" onclick="resetGame()">🔄 Opnieuw</button>
</div>

<!-- ── Game area ────────────────────────────────────────────── -->
<div class="game-wrapper">
    <div class="col-left">
        <div class="col-header">Categorieën</div>
        <div id="categories-col"></div>
    </div>
    <div class="col-right">
        <div class="col-header">Klik op een item, dan op de juiste categorie ▶</div>
        <div class="items-pool" id="items-col"></div>
    </div>
</div>

<!-- ── Notification ─────────────────────────────────────────── -->
<div id="notification"></div>
<div id="help-tooltip" aria-hidden="true"></div>

<!-- ── Victory overlay ─────────────────────────────────────── -->
<div id="victory">
    <div class="victory-box">
        <h2>🏆 Gefeliciteerd!</h2>
        <p id="victory-msg"></p>
        <button class="btn-replay"     onclick="resetGame()">🔄 Opnieuw spelen</button>
        <button class="btn-next-level" id="btn-victory-next" onclick="goNextLevel()">
            Niveau 2 →
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

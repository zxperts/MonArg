<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Het Weer - Jeux éducatifs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="../">Accueil</a>
            <a href="../vocab/">Vocabulaire</a>
            <a href="../vocab05q1/">Vocabulaire05Q1</a>
            <a href="#" class="active">Het Weer</a>
        </nav>

        <header>
            <h1>🌦️ Het Weer</h1>
            <p>Trouvez la traduction française du mot néerlandais.</p>
        </header>

        <section class="stats">
            <div class="stat-card">
                <span>Score</span>
                <strong id="score">0/0</strong>
            </div>
            <div class="stat-card">
                <span>Série</span>
                <strong id="streak">0</strong>
            </div>
            <div class="stat-card">
                <span>Restant</span>
                <strong id="remaining">0</strong>
            </div>
        </section>

        <main class="quiz-card">
            <p class="label">Mot néerlandais</p>
            <h2 id="question">Chargement...</h2>

            <div id="options" class="options"></div>

            <p id="feedback" class="feedback"></p>

            <div class="actions">
                <button id="nextBtn" disabled>Question suivante</button>
                <button id="restartBtn" class="secondary">Recommencer</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
